<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery - Satadal Dhara | Digital Art & Creations</title>
    <meta name="description"
        content="Explore Satadal Dhara's digital art gallery featuring AI-generated artwork, concept sketches, and 3D renders.">
    <meta name="keywords" content="Digital Art, AI Art, Stable Diffusion, ComfyUI Art, Gallery">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Gallery - Satadal Dhara">
    <meta property="og:description" content="Digital art gallery featuring AI-generated artwork and creative concepts.">
    <meta property="og:image" content="https://satadaldhara.github.io/assets/satadal.jpg">
    <meta property="og:url" content="https://satadaldhara.github.io/gallery.html">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="YOUR-WEBSITE-ID"></script>
</head>

<body>
    <script>document.body.classList.add('fade-in');</script>
    <div class="bg-animation"></div>
    <canvas id="neural-network-canvas"></canvas>

    <!-- Island Navigation -->
    <nav class="island-nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html" id="nav-home">Home</a></li>
                <li><a href="projects.html" id="nav-projects">Projects</a></li>
                <li><a href="blog.html" id="nav-blog">Blog</a></li>
                <li><a href="contact.html" id="nav-contact">Contact</a></li>
            </ul>
            <div class="theme-toggle-wrapper">
                <div class="ai-mode-toggle">
                    <label class="theme-switch" for="ai-checkbox">
                        <input type="checkbox" id="ai-checkbox" />
                        <div class="slider round">
                            <span class="icon-professional">👨‍💼</span>
                            <span class="icon-ai">🤖</span>
                        </div>
                    </label>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page content -->
    <div id="gallery" class="page page-section">
        <div class="container gallery-container">
            <h1 class="page-title">Digital Artwork Gallery</h1>
            <p class="page-subtitle">Explore my creative digital creations</p>

            <!-- Albums Grid (Default View) -->
            <div id="albums-grid" class="albums-grid">
                <!-- Albums are dynamically generated by script.js -->
            </div>

            <!-- Single Album View (Hidden by default) -->
            <div id="album-view" class="album-view" style="display: none;">
                <div class="album-header">
                    <button id="back-to-albums" class="btn btn-outline">← Back to Albums</button>
                    <h2 id="current-album-title" class="section-title" style="font-size: 2em; margin: 0;">Album Title
                    </h2>
                </div>
                <div id="gallery-items" class="gallery">
                    <!-- Images are dynamically inserted here -->
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Satadal Dhara. Crafted with passion and code.</p>
    </footer>

    <!-- Modal for Image Viewing -->
    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script defer src="assets/js/script.js"></script>
</body>

</html>
